name = "pvpwire-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding removed in v2 pivot Step 3 (Ask Flosium retired).

# KV namespaces.
# Run: wrangler kv:namespace create NEWS_CACHE  to populate the IDs below.
[[kv_namespaces]]
binding = "NEWS_CACHE"
id = "REPLACE_WITH_NEWS_CACHE_ID"

[[kv_namespaces]]
binding = "SUBMISSIONS"
id = "REPLACE_WITH_SUBMISSIONS_ID"

# RATE_LIMIT KV is shared with the X bot (worker/src/twitter.ts paces posts via this namespace).
# Step 3 removed the Ask Flosium consumer of this namespace; the X bot consumer remains.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_RATE_LIMIT_ID"

[[kv_namespaces]]
binding = "BOT_LOG"
id = "REPLACE_WITH_BOT_LOG_ID"

# Cron triggers:
#   "*/5 * * * *"   every 5 min:  refresh /live snapshot (Steam concurrent players for the catalog)
#   "*/30 * * * *"  every 30 min: refresh news cache (editorial/Reddit/Steam) + trending + paced X post
#   "0 4 * * 1"     weekly Mon 4: refresh IGDB enrichment (Integration B; no-op without IGDB creds)
#   "0 5 * * *"     daily 5am:    refresh PandaScore tournaments + teams (Integration C; no-op without key)
[triggers]
crons = ["*/5 * * * *", "*/30 * * * *", "0 4 * * 1", "0 5 * * *"]

[vars]
# Public-safe variables. Secrets go via `wrangler secret put`.
SITE_URL = "https://pvpwire.com"
USER_AGENT = "PVPWireBot/1.0 (+https://pvpwire.com)"
