<?xml version="1.0" encoding="UTF-8"?>
<!--
  PVPWire site-default Open Graph image (1200x630).
  Used as fallback when no per-entity OG asset is generated.
  v2.2: replace with a commissioned PNG.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#16162a"/>
    </linearGradient>
    <radialGradient id="flare" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#dc5454" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#dc5454" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#flare)"/>
  <text
    x="80" y="320"
    font-family="Inter, system-ui, sans-serif"
    font-size="120"
    font-weight="900"
    fill="#e8e4dc"
    letter-spacing="-3"
  >PVPWire</text>
  <text
    x="80" y="380"
    font-family="Source Serif 4, Georgia, serif"
    font-size="32"
    fill="#dc5454"
  >Competitive PvP, current and indexed.</text>
  <text
    x="80" y="560"
    font-family="JetBrains Mono, monospace"
    font-size="16"
    fill="#84827c"
    letter-spacing="2"
    text-transform="uppercase"
  >GAMES · ESPORTS · NEWS · ARCHIVE</text>
  <line x1="80" y1="430" x2="280" y2="430" stroke="#dc5454" stroke-width="3"/>
</svg>
